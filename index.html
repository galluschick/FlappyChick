<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chick Flap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    touch-action: manipulation; /* Prevents double-tap zoom */
}
.game-container {
    position: relative;
    width: 100%;
    max-width: 400px;
    margin: 10px;
}
canvas {
    display: block;
    width: 100%;
    height: auto;
    border: 4px solid black;
    border-radius: 10px;
    background: #70c5ce;
    touch-action: none; /* Prevents touch scrolling on canvas */
}
#score {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: clamp(20px, 6vw, 30px);
    color: white;
    text-shadow: 2px 2px 4px black;
    z-index: 10;
    pointer-events: none;
}
#message {
    position: absolute;
    bottom: 80px;
    left: 0;
    right: 0;
    text-align: center;
    color: white;
    font-size: clamp(16px, 5vw, 20px);
    text-shadow: 2px 2px 4px black;
    z-index: 10;
    pointer-events: none;
    white-space: pre-line;
}
/* Optional: Add a visual hint for mobile */
.tap-hint {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    display: none;
}
@media (max-width: 768px) {
    .tap-hint {
        display: block;
    }
}
</style>
</head>
<body>
<div class="game-container">
    <div id="score">Score: 0 | High: 0</div>
    <div id="message">Tap or Press Space to Start</div>
    <canvas id="game" width="400" height="600"></canvas>
    <div class="tap-hint">👆 Tap anywhere to jump</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");
const message = document.getElementById("message");

let gravity = 0.5;
let velocity = 0;
let lift = -10;
let score = 0;
let frame = 0;

let gameState = "MENU";
let highScore = localStorage.getItem("chickHighScore") || 0;

let cloudOffset = 0;
let treeOffset = 0;

const chick = {
    x: 80,
    y: 300,
    size: 30
};

let pipes = [];

// Add touch event tracking to prevent multiple jumps
let canJump = true;
let touchStartY = 0;

function resetGame() {
    velocity = 0;
    chick.y = 300;
    pipes = [];
    score = 0;
    frame = 0;
    scoreDisplay.innerText = "Score: 0 | High: " + highScore;
}

function spawnPipe() {
    const gap = 230;
    const top = Math.random() * 250 + 50;

    pipes.push({
        x: canvas.width,
        width: 60,
        top: top,
        bottom: canvas.height - top - gap,
        passed: false
    });
}

function drawClouds() {
    ctx.fillStyle = "white";
    for (let i = -1; i < 6; i++) {
        let x = i * 150 + cloudOffset;

        ctx.beginPath();
        ctx.arc(x + 40, 100, 25, 0, Math.PI * 2);
        ctx.arc(x + 70, 100, 30, 0, Math.PI * 2);
        ctx.arc(x + 100, 100, 25, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawTrees() {
    const groundLevel = canvas.height - 40;
    const trunkHeight = 60;
    const trunkWidth = 20;
    const crownRadius = 40;

    for (let i = -1; i < 6; i++) {
        let x = i * 120 + treeOffset;

        ctx.fillStyle = "#8B5A2B";
        ctx.fillRect(
            x + 40,
            groundLevel - trunkHeight,
            trunkWidth,
            trunkHeight
        );

        ctx.fillStyle = "green";
        ctx.beginPath();
        ctx.arc(
            x + 50,
            groundLevel - trunkHeight,
            crownRadius,
            0,
            Math.PI * 2
        );
        ctx.fill();
    }
}

function drawChick() {
    ctx.save();

    let angle = velocity * 0.05;
    ctx.translate(chick.x, chick.y);
    ctx.rotate(angle);

    ctx.fillStyle = "#FFD84D";
    ctx.beginPath();
    ctx.arc(0, 0, chick.size, 0, Math.PI * 2);
    ctx.fill();

    let wingOffset = Math.sin(frame * 0.3) * 5;
    ctx.fillStyle = "#FFC83D";
    ctx.beginPath();
    ctx.ellipse(-8, 5 + wingOffset, 12, 18, -0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(10, -5, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(12, -5, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(13, -7, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "pink";
    ctx.beginPath();
    ctx.arc(5, 8, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#FF9F1C";
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(32, -4);
    ctx.lineTo(32, 4);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#FF9F1C";
    ctx.fillRect(-8, chick.size - 2, 6, 8);
    ctx.fillRect(2, chick.size - 2, 6, 8);

    ctx.restore();
}

function drawPipes() {
    ctx.fillStyle = "green";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipe.width, pipe.bottom);
    });
}

function updatePipes() {
    pipes.forEach(pipe => {
        pipe.x -= 2.2;

        if (!pipe.passed && pipe.x + pipe.width < chick.x) {
            pipe.passed = true;
            score++;
            scoreDisplay.innerText = "Score: " + score + " | High: " + highScore;
        }

        if (
            chick.x + chick.size > pipe.x &&
            chick.x - chick.size < pipe.x + pipe.width &&
            (chick.y - chick.size < pipe.top ||
             chick.y + chick.size > canvas.height - pipe.bottom)
        ) {
            endGame();
        }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
}

function endGame() {
    gameState = "GAME_OVER";

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("chickHighScore", highScore);
    }

    message.innerText = "Game Over\nTap or Press Space";
    message.style.display = "block";
}

function drawMenu() {
    ctx.fillStyle = "white";
    ctx.font = "bold 40px Arial";
    ctx.textAlign = "center";
    ctx.fillText("CHICK FLAP", canvas.width / 2, 200);

    ctx.font = "20px Arial";
    ctx.fillText("High Score: " + highScore, canvas.width / 2, 250);
    ctx.fillText("Tap to Start", canvas.width / 2, 300);
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    cloudOffset -= 0.3;
    treeOffset -= 1;

    if (cloudOffset <= -150) cloudOffset = 0;
    if (treeOffset <= -120) treeOffset = 0;

    drawClouds();
    drawTrees();

    if (gameState === "PLAYING") {
        velocity += gravity;
        chick.y += velocity;

        if (frame % 90 === 0) spawnPipe();
        updatePipes();

        if (chick.y + chick.size > canvas.height || chick.y - chick.size < 0) {
            endGame();
        }

        frame++;
    }

    if (gameState === "MENU") {
        drawMenu();
    }

    drawPipes();
    drawChick();

    requestAnimationFrame(update);
}

function jump() {
    if (canJump) {
        velocity = lift;
        canJump = false;
        // Reset jump flag after a short delay to prevent multiple jumps from one touch
        setTimeout(() => {
            canJump = true;
        }, 100);
    }
}

function startGame() {
    resetGame();
    gameState = "PLAYING";
    message.style.display = "none";
}

// Keyboard controls (for testing and PC)
document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        e.preventDefault(); // Prevent page scroll
        if (gameState === "MENU" || gameState === "GAME_OVER") {
            startGame();
        } else if (gameState === "PLAYING") {
            jump();
        }
    }
});

// Touch controls for mobile
canvas.addEventListener("touchstart", e => {
    e.preventDefault(); // Prevent default touch actions
    
    const touch = e.touches[0];
    touchStartY = touch.clientY;
    
    if (gameState === "MENU" || gameState === "GAME_OVER") {
        startGame();
    } else if (gameState === "PLAYING") {
        jump();
    }
}, { passive: false });

// Also handle click for PC and some mobile browsers
canvas.addEventListener("click", e => {
    e.preventDefault();
    if (gameState === "MENU" || gameState === "GAME_OVER") {
        startGame();
    } else if (gameState === "PLAYING") {
        jump();
    }
});

// Prevent context menu on long press
canvas.addEventListener("contextmenu", e => {
    e.preventDefault();
});

// Handle visibility change to prevent game from running in background
document.addEventListener("visibilitychange", () => {
    if (document.hidden && gameState === "PLAYING") {
        // Optional: pause game when tab is hidden
    }
});

// Initialize high score display
scoreDisplay.innerText = "Score: 0 | High: " + highScore;

// Start the game loop
resetGame();
update();
</script>

</body>
</html>
