<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chick Flap</title>
<style>
body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}
canvas {
    border: 4px solid black;
    border-radius: 10px;
    background: #70c5ce;
}
#score {
    position: absolute;
    top: 20px;
    font-size: 30px;
    color: white;
    text-shadow: 2px 2px 4px black;
}
#message {
    position: absolute;
    bottom: 80px;
    color: white;
    font-size: 20px;
}
</style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="message">Click or Press Space to Start</div>
<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");
const message = document.getElementById("message");

let gravity = 0.5;
let velocity = 0;
let lift = -10;
let score = 0;
let frame = 0;

let gameState = "MENU";
let highScore = localStorage.getItem("chickHighScore") || 0;

let cloudOffset = 0;
let treeOffset = 0;

const chick = {
    x: 80,
    y: 300,
    size: 30
};

let pipes = [];

function resetGame() {
    velocity = 0;
    chick.y = 300;
    pipes = [];
    score = 0;
    frame = 0;
    scoreDisplay.innerText = "Score: 0 | High: " + highScore;
}

function spawnPipe() {
    const gap = 230;
    const top = Math.random() * 250 + 50;

    pipes.push({
        x: canvas.width,
        width: 60,
        top: top,
        bottom: canvas.height - top - gap,
        passed: false
    });
}

function drawClouds() {
    ctx.fillStyle = "white";
    for (let i = -1; i < 6; i++) {
        let x = i * 150 + cloudOffset;

        ctx.beginPath();
        ctx.arc(x + 40, 100, 25, 0, Math.PI * 2);
        ctx.arc(x + 70, 100, 30, 0, Math.PI * 2);
        ctx.arc(x + 100, 100, 25, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawTrees() {
    const groundLevel = canvas.height - 40; // define ground height
    const trunkHeight = 60;
    const trunkWidth = 20;
    const crownRadius = 40;

    for (let i = -1; i < 6; i++) {
        let x = i * 120 + treeOffset;

        // Trunk (touching ground)
        ctx.fillStyle = "#8B5A2B";
        ctx.fillRect(
            x + 40,
            groundLevel - trunkHeight,
            trunkWidth,
            trunkHeight
        );

        // Leaves sitting on trunk
        ctx.fillStyle = "green";
        ctx.beginPath();
        ctx.arc(
            x + 50,
            groundLevel - trunkHeight,
            crownRadius,
            0,
            Math.PI * 2
        );
        ctx.fill();
    }
}

function drawChick() {
      ctx.save();

    // Slight rotation based on velocity
    let angle = velocity * 0.05;
    ctx.translate(chick.x, chick.y);
    ctx.rotate(angle);

    // Body
    ctx.fillStyle = "#FFD84D";
    ctx.beginPath();
    ctx.arc(0, 0, chick.size, 0, Math.PI * 2);
    ctx.fill();

    // Wing (animated bounce)
    let wingOffset = Math.sin(frame * 0.3) * 5;
    ctx.fillStyle = "#FFC83D";
    ctx.beginPath();
    ctx.ellipse(-8, 5 + wingOffset, 12, 18, -0.5, 0, Math.PI * 2);
    ctx.fill();

    // Eye (big + cute)
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(10, -5, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(12, -5, 4, 0, Math.PI * 2);
    ctx.fill();

    // Eye shine
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(13, -7, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Blush
    ctx.fillStyle = "pink";
    ctx.beginPath();
    ctx.arc(5, 8, 4, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = "#FF9F1C";
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(32, -4);
    ctx.lineTo(32, 4);
    ctx.closePath();
    ctx.fill();

    // Feet
    ctx.fillStyle = "#FF9F1C";
    ctx.fillRect(-8, chick.size - 2, 6, 8);
    ctx.fillRect(2, chick.size - 2, 6, 8);

    ctx.restore();
}
function drawPipes() {
    ctx.fillStyle = "green";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipe.width, pipe.bottom);
    });
}

function updatePipes() {
    pipes.forEach(pipe => {
        pipe.x -= 2.2;

        if (!pipe.passed && pipe.x + pipe.width < chick.x) {
            pipe.passed = true;
            score++;
            scoreDisplay.innerText = "Score: " + score + " | High: " + highScore;
        }

        if (
            chick.x + chick.size > pipe.x &&
            chick.x - chick.size < pipe.x + pipe.width &&
            (chick.y - chick.size < pipe.top ||
             chick.y + chick.size > canvas.height - pipe.bottom)
        ) {
            endGame();
        }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
}

function endGame() {
    gameState = "GAME_OVER";

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("chickHighScore", highScore);
    }

    message.innerText = "Game Over\nClick or Press Space";
    message.style.display = "block";
}

function drawMenu() {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.fillText("CHICK FLAP", canvas.width / 2, 200);

    ctx.font = "20px Arial";
    ctx.fillText("High Score: " + highScore, canvas.width / 2, 250);
    ctx.fillText("Click or Press Space to Start", canvas.width / 2, 300);
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Sky
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Parallax movement
    cloudOffset -= 0.3;
    treeOffset -= 1;

    if (cloudOffset <= -150) cloudOffset = 0;
    if (treeOffset <= -120) treeOffset = 0;

    drawClouds();
    drawTrees();

    if (gameState === "PLAYING") {
        velocity += gravity;
        chick.y += velocity;

        if (frame % 90 === 0) spawnPipe();
        updatePipes();

        if (chick.y + chick.size > canvas.height || chick.y - chick.size < 0) {
            endGame();
        }

        frame++;
    }

    if (gameState === "MENU") {
        drawMenu();
    }

    drawPipes();
    drawChick();

    requestAnimationFrame(update);
}

function jump() {
    velocity = lift;
}

function startGame() {
    resetGame();
    gameState = "PLAYING";
    message.style.display = "none";
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        if (gameState === "MENU" || gameState === "GAME_OVER") {
            startGame();
        }
        jump();
    }
});

canvas.addEventListener("click", () => {
    if (gameState === "MENU" || gameState === "GAME_OVER") {
        startGame();
    }
    jump();
});

resetGame();
update();
</script>

</body>
</html>
